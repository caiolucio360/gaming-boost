<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F3E8FF"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
  </defs>

  <!-- Rounded brand tile -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Stylized flute, rotated slightly for energy -->
  <g transform="rotate(-18 32 32)">
    <!-- mouthpiece cap -->
    <rect x="8" y="27" width="11" height="10" rx="5" fill="#A855F7"/>
    <circle cx="13" cy="32" r="2.4" fill="#4C1D95"/>
    <!-- body -->
    <rect x="17" y="28.5" width="39" height="7" rx="3.5" fill="url(#body)"/>
    <!-- keys -->
    <circle cx="27" cy="25.5" r="2.6" fill="#C084FC"/>
    <circle cx="35" cy="25.5" r="2.6" fill="#C084FC"/>
    <circle cx="43" cy="25.5" r="2.6" fill="#C084FC"/>
    <!-- holes -->
    <circle cx="27" cy="32" r="1.5" fill="#4C1D95"/>
    <circle cx="35" cy="32" r="1.5" fill="#4C1D95"/>
    <circle cx="43" cy="32" r="1.5" fill="#4C1D95"/>
  </g>
</svg>
